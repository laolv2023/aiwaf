# AIWAF-Stream 配置文件
#
# 使用方式:
#   1. 将此文件复制为 config.yaml
#   2. 修改所需配置项
#   3. 启动: python engine.py
#
# 或指定路径:
#   AIWAF_CONFIG=/etc/aiwaf/config.yaml python engine.py
#
# 环境变量会覆盖 YAML 中同名字段（优先级：环境变量 > YAML > 默认值）

# ── Redis ──
redis_cluster_url: "redis://localhost:6379"

# ── Kafka ──
kafka_brokers: "localhost:9092"

# Kafka Topics
input_topic: "akto.api.logs"        # 消费 Topic（Akto 流量日志 JSON）
alert_topic: "akto.aiwaf.alerts"     # 告警 Topic
dlq_topic: "akto.aiwaf.dlq"          # 死信 Topic

# Kafka Consumer
consumer_group: "aiwaf-consumer-group"

# ── 进程池 ──
core_process_pool_size: 4

# ── 速率限制 ──
rate_limit_window: 60                # 窗口大小（秒）
rate_limit_max_requests: 100         # 窗口内最大请求数
rate_limit_flood_threshold: 150      # 洪泛检测阈值
fail_secure_local_limit: 50          # Redis 不可用时的本地降级阈值

# ── 地理围栏 ──
geoip_db_path: ""                    # MaxMind GeoIP2 DB 路径（空=禁用）
geo_block_countries: ""              # 阻止的国家（逗号分隔，如 "CN,RU,KP"）
geo_allow_countries: ""              # 允许的国家（逗号分隔，空=全部允许）

# ── Kafka Producer ──
kafka_enable_idempotence: true       # 幂等生产者
kafka_acks: "all"                    # 确认级别（all/1/0）

# ── Kafka Consumer ──
kafka_auto_offset_reset: "earliest"  # 无偏移时从最早开始
kafka_max_poll_records: 500          # 单次拉取最大记录数

# ── 进程池 ──
max_tasks_per_child: 200             # 子进程最大任务数（防内存泄漏）

# ── 微批处理 ──
batch_max_size: 50                   # 每批最大消息数
batch_timeout_ms: 10                 # 批处理超时（毫秒）
batch_queue_maxsize: 10000           # 批处理队列最大长度

# ── 关键词刷新 ──
keyword_refresh_interval: 10         # 关键词缓存刷新间隔（秒）
keyword_top_n: 500                   # 从 Redis 获取的 Top N 关键词数

# ── Redis TTL ──
dedup_ttl: 86400                     # 去重记录 TTL（秒，默认 24 小时）
blacklist_ttl: 3600                  # IP 黑名单 TTL（秒，默认 1 小时）
local_blacklist_ttl: 300             # 本地黑名单 TTL（秒，默认 5 分钟）
local_rate_limit_ttl: 60             # 本地速率限制 TTL（秒）

# ── 熔断器 ──
circuit_breaker_fail_max: 5          # 连续失败多少次跳闸
circuit_breaker_timeout: 60          # 熔断器恢复探测间隔（秒）

# ── Fail-Secure 缓冲 ──
max_pending_ips: 10000               # 待同步 IP 缓冲最大长度

# ── Body 截断 ──
max_body_hash_bytes: 10485760        # Body 哈希截断阈值（字节，默认 10MB）
max_body_store_bytes: 1024           # Body 存储截断阈值（字节，默认 1KB）

# ── 请求头验证 ──
# 必需头（逗号分隔，空=不检查必需头）
# 默认要求 user-agent 和 accept，内网 API 场景可设为空或自定义
header_required: "user-agent,accept"
# 跳过请求头检查的 IP/CIDR（逗号分隔，支持 CIDR 如 192.168.0.0/16）
header_skip_ips: ""
# 跳过请求头检查的路径前缀（逗号分隔）
header_skip_paths: ""
# User-Agent 最大长度
header_max_ua_length: 500
# Accept 最大长度
header_max_accept_length: 4096
# 自定义可疑 UA 模式（逗号分隔，空=用内置默认列表 curl,wget,python,...）
header_suspicious_ua: ""
# 合法爬虫 UA（逗号分隔，空=用内置默认列表 googlebot,bingbot,...）
header_legitimate_bots: ""

# ── AI 异常检测 ──
ai_min_logs: 50                      # 最小训练样本数（不足则跳过 AI 训练）
ai_contamination: 0.05               # IsolationForest 污染率（异常比例）
ai_n_estimators: 100                 # IsolationForest 树数
ai_max_samples: "auto"               # IsolationForest 最大样本数

# ── 蜜罐时序检测 ──
honeypot_ttl: 300                    # 蜜罐 GET 时间戳 TTL（秒）

# ── 关键词策略 ──
keyword_min_segment_length: 3        # 路径段最小长度（短于此不参与关键词检测）

# ── Redis 同步 ──
background_sync_interval: 5          # 后台同步 Worker 间隔（秒）
